# Included workspace roots
packages:
  - 'packages/*' # Shared SDK / utils / types / tuffex
  - packages/tuffex/packages/components # Nested tuffex component package
  - 'apps/core-app' # Electron main product
  - 'apps/nexus' # Documentation & ecosystem site (Nuxt)
  - 'apps/reverse-proxy-design' # Nexus trust-boundary design publication
  - 'apps/tuff-analyse' # Internal Vite analysis dashboard
  - 'plugins/*' # Official & example plugins

  # --- Exclusions ---
  # Archived / prototype apps not part of active workspace
  - '!apps/g-*'
  - '!apps/quota-*'

  # Build artifacts (prevent pnpm from crawling generated files)
  - '!apps/**/out/**'
  - '!apps/**/dist/**'
  - '!apps/**/.output/**' # Nuxt output
  - '!apps/**/.nuxt/**' # Nuxt dev cache
  - '!apps/**/.vitepress/**'
  - '!packages/**/dist/**'
  - '!packages/**/.vitepress/**'
  - '!plugins/**/dist/**'

  # node_modules — avoid double-indexing
  - '!apps/**/node_modules/**'
  - '!packages/**/node_modules/**'
  - '!plugins/**/node_modules/**'

  # Runtime plugin installs inside core-app (managed separately)
  - '!apps/core-app/tuff/modules/plugins/**'

