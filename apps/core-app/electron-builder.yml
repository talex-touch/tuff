appId: com.tagzxia.app.tuff
productName: tuff
executableName: tuff
asar: true
compression: maximum
asarUnpack:
  - '**/node_modules/@libsql/**'
  - '**/node_modules/libsql/**'
  - '**/node_modules/@neon-rs/**'
  - '**/node_modules/detect-libc/**'
  - '**/*.node'
  - '**/*.dylib'
  - '**/*.dll'
  - '**/*.so'
  - '**/node_modules/sharp/**'
  - '**/node_modules/@img/**'
  - '**/node_modules/ffmpeg-static/**'
  - '**/node_modules/ffprobe-static/**'
directories:
  app: .
  buildResources: build
  output: dist
files:
  - out/**
  - resources/**
  - package.json
  - '!resources/bundled-plugins/**'
  - node_modules/**
  - '!.DS_Store'
  - '!.vscode/**'
  - '!src/**'
  - '!tests/**'
  - '!docs/**'
  - '!examples/**'
  - '!shots/**'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,CHANGELOG.md,README.md}'
  - '!**/.eslintcache'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!scripts/**'
  - '!build/**'
  - '!**/*.map'
  - '!patches/**'
  # Exclude Rust/Cargo build cache from @talex-touch/tuff-native (~498MB of .rlib/.rmeta intermediates).
  # Runtime only loads build/Release/*.node (native-loader.js); native-screenshot/target/ is build-only output.
  - '!**/native-screenshot/target/**'
  - '!**/*.rlib'
  - '!**/*.rmeta'
  # Keep js-tiktoken ESM runtime files: @langchain/core imports js-tiktoken/lite via ESM,
  # which resolves to dist/lite.js from the package exports map in packaged builds.
  # mathjs is bundled into out/main/index.js (not externalized) to enable tree-shaking.
  # Only mathjs/number subset (~2MB) gets bundled; the full ~13MB mathjs package in node_modules is unused.
  - '!**/node_modules/mathjs/**'
extraFiles: []
extraResources:
  - from: resources/icon.png
    to: resources/icon.png
  - from: resources/TrayIconTemplate.png
    to: resources/TrayIconTemplate.png
  - from: resources/TrayIconTemplate@2x.png
    to: resources/TrayIconTemplate@2x.png
  - from: resources/tray_icon.png
    to: resources/tray_icon.png
  - from: resources/tray_icon_16x16.png
    to: resources/tray_icon_16x16.png
  - from: resources/tray_icon_22x22.png
    to: resources/tray_icon_22x22.png
  - from: resources/keys/release-signing-public.pem
    to: resources/keys/release-signing-public.pem
  - from: resources/scripts/macos-apply-update.sh
    to: resources/scripts/macos-apply-update.sh
  - from: resources/scripts/macos-restore-update.sh
    to: resources/scripts/macos-restore-update.sh
  - from: resources/scripts/update-handoff-helper.cjs
    to: resources/scripts/update-handoff-helper.cjs
  - from: resources/bundled-plugins
    to: bundled-plugins
    filter:
      - '**/*'

win:
  target:
    - target: nsis
      arch:
        - x64
  verifyUpdateCodeSignature: false
  requestedExecutionLevel: asInvoker
  artifactName: ${productName}-${version}-setup.${ext}
nsis:
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  include: build/installer.nsh
  warningsAsErrors: false
  runAfterFinish: true
  createStartMenuShortcut: true
  menuCategory: false
  differentialPackage: false
mac:
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    LSUIElement: true
    NSCameraUsageDescription: Application requests access to the device's camera.
    NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
    NSDesktopFolderUsageDescription: Application requests access to the user's Desktop folder.
  notarize: false
  gatekeeperAssess: false
  target:
    - target: dir
      arch: arm64
  icon: build/icon.icns
  category: public.app-category.productivity
  forceCodeSigning: false
  hardenedRuntime: true
  artifactName: ${productName}-${version}.${ext}
dmg:
linux:
  target:
    - AppImage
    - deb
  maintainer: tagzxia.com
  category: Utility
snap:
  confinement: strict
  grade: stable
  summary: A powerful productivity launcher and automation tool
  description: |
    Talex Touch is a modern productivity launcher that helps you quickly access applications,
    files, and perform various automation tasks with a clean, efficient interface.
  plugs:
    - home
    - network
    - removable-media
  environment:
    DISABLE_WAYLAND: '1'
  # 修复 app-builder 执行问题
  useTemplateApp: false
  desktop:
appImage:
  artifactName: ${productName}-${version}.${ext}
  category: Utility
  synopsis: A powerful productivity launcher and automation tool
deb:
  artifactName: ${productName}-${version}.${ext}
  category: Utility
  synopsis: A powerful productivity launcher and automation tool
npmRebuild: false
forceCodeSigning: false
# Fix for pnpm workspace dependency resolution issues with electron-builder
# Skip automatic dependency detection and use only what's in out/package.json
publish:
  provider: github
  owner: talex-touch
  repo: tuff
afterPack: scripts/build-target/after-pack.js
