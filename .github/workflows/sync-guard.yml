name: Sync Guard

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  sync-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install pnpm
        run: corepack prepare pnpm@10.24.0 --activate

      - name: Run legacy sync guard
        run: node scripts/check-no-legacy-sync-value-json.mjs
