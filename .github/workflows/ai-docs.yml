name: AI Docs

on:
  pull_request:
    paths:
      - mise.toml
      - scripts/ai-docs/**
      - docs/plan-prd/03-features/ai-2.5*.md
      - docs/plan-prd/04-implementation/**
      - docs/plan-prd/TODO.md
      - docs/INDEX.md
      - .github/workflows/ai-docs.yml
  push:
    branches:
      - master
      - main
    paths:
      - mise.toml
      - scripts/ai-docs/**
      - docs/plan-prd/03-features/ai-2.5*.md
      - docs/plan-prd/04-implementation/**
      - docs/plan-prd/TODO.md
      - docs/INDEX.md
      - .github/workflows/ai-docs.yml

permissions:
  contents: read

concurrency:
  group: ai-docs-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          cache: true
          install: true

      - name: Verify AI docs
        run: mise run ai-docs:verify
