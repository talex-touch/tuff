name: Pilot Image Publish

on:
  push:
    branches:
      - master
    paths:
      - 'apps/pilot/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.dockerignore'
      - '.github/workflows/pilot-image.yml'
  workflow_dispatch:

concurrency:
  group: pilot-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-ghcr:
    name: Build and Push Pilot Image
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner}/tuff-pilot" >> "${GITHUB_OUTPUT}"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=pilot-,format=short
            type=raw,value=pilot-latest

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/pilot/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image digest
        run: |
          echo "Image: ${{ steps.image.outputs.name }}"
          echo "Tags:"
          echo "${{ steps.meta.outputs.tags }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"

      - name: Ensure GHCR package is public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_API_URL: ${{ github.api_url }}
        run: |
          token="${GITHUB_TOKEN}"
          if [ -z "${token}" ]; then
            echo "::warning::No token available for GHCR visibility update, skip."
            exit 0
          fi

          owner="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          owner_json="$(curl -fsSL \
            -H "Authorization: Bearer ${token}" \
            -H "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/users/${owner}")"
          owner_type="$(OWNER_JSON="${owner_json}" python3 -c 'import json, os; print(json.loads(os.environ[\"OWNER_JSON\"]).get(\"type\", \"\"))')"

          if [ "${owner_type}" = "Organization" ]; then
            endpoint="${GITHUB_API_URL}/orgs/${owner}/packages/container/tuff-pilot/visibility"
          else
            endpoint="${GITHUB_API_URL}/user/packages/container/tuff-pilot/visibility"
          fi

          code="$(curl -sS -o /tmp/ghcr-visibility-response.json -w '%{http_code}' \
            -X PATCH "${endpoint}" \
            -H "Authorization: Bearer ${token}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -d '{"visibility":"public"}')"

          if [ "${code}" = "200" ] || [ "${code}" = "204" ]; then
            echo "GHCR package visibility ensured: public"
            exit 0
          fi

          echo "::warning::Failed to set GHCR package visibility to public (HTTP ${code}). Configure package visibility manually once in GitHub Packages."
          cat /tmp/ghcr-visibility-response.json || true
