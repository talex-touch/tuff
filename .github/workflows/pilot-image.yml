name: Pilot Image Publish

on:
  push:
    branches:
      - master
    paths:
      - 'apps/pilot/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.dockerignore'
      - '.github/workflows/pilot-image.yml'
  workflow_dispatch:

concurrency:
  group: pilot-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-ghcr:
    name: Build and Push Pilot Image
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner}/tuff-pilot" >> "${GITHUB_OUTPUT}"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=pilot-,format=short
            type=raw,value=pilot-latest

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/pilot/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image digest
        run: |
          echo "Image: ${{ steps.image.outputs.name }}"
          echo "Tags:"
          echo "${{ steps.meta.outputs.tags }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"

      - name: Trigger 1Panel deploy webhook
        env:
          WEBHOOK_URL: ${{ secrets.ONEPANEL_WEBHOOK_URL }}
          WEBHOOK_TOKEN: ${{ secrets.ONEPANEL_WEBHOOK_TOKEN }}
          IMAGE_REPO: ${{ steps.image.outputs.name }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ -z "${WEBHOOK_URL}" ] || [ -z "${WEBHOOK_TOKEN}" ]; then
            echo "ONEPANEL_WEBHOOK_URL or ONEPANEL_WEBHOOK_TOKEN is empty, skip webhook deploy trigger."
            exit 0
          fi

          payload="$(cat <<EOF
          {
            "repository": "${GITHUB_REPOSITORY}",
            "branch": "${GITHUB_REF_NAME}",
            "sha": "${GITHUB_SHA}",
            "image": "${IMAGE_REPO}",
            "tag": "pilot-latest",
            "image_ref": "${IMAGE_REPO}@${IMAGE_DIGEST}",
            "digest": "${IMAGE_DIGEST}",
            "workflow": "pilot-image"
          }
          EOF
          )"

          deploy_url="${WEBHOOK_URL%/}/deploy"

          for attempt in 1 2 3; do
            if curl --fail --show-error --silent \
              --request POST \
              --header "Content-Type: application/json" \
              --header "X-Pilot-Token: ${WEBHOOK_TOKEN}" \
              --data "${payload}" \
              "${deploy_url}"; then
              echo "Triggered 1Panel deploy webhook."
              exit 0
            fi

            if [ "${attempt}" -lt 3 ]; then
              echo "::warning::1Panel deploy webhook attempt ${attempt} failed, retrying."
              sleep $((attempt * 5))
            fi
          done

          echo "::warning::1Panel deploy webhook failed after retries; image was already pushed to GHCR, skip deploy trigger."
