name: Build and Release

on:
  # 手动触发（可选：仅同步指定 tag 到 Nexus）
  workflow_dispatch:
    inputs:
      release_type:
        description: Release type
        required: true
        default: beta
        type: choice
        options:
          - beta
          - snapshot
          - release
      sync_tag:
        description: Optional existing tag to sync Nexus release metadata only (e.g. v2.4.7)
        required: false
        type: string

      rollback_compatible:
        description: Enable normal-quit recovery only with verified downgrade evidence
        required: false
        default: false
        type: boolean
      rollback_evidence:
        description: Repository-relative canonical downgrade evidence JSON when rollback compatibility is enabled
        required: false
        type: string
      rollback_evidence_signature:
        description: Repository-relative detached signature for rollback_evidence
        required: false
        type: string
  # 标签触发（使用 bumpp 打好的标签自动触发）
  push:
    tags:
      - v*.*.*

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build and Release Tuff App
    runs-on: ${{ matrix.os }}
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.sync_tag == ''
    permissions:
      contents: read

    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
      ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/../electron-builder-cache
      BUILD_PUBLISH: never

    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, macos-latest, ubuntu-latest]

    steps:
      - name: Check out git repository
        uses: actions/checkout@v7

      - name: Setup Python (for native dependencies)
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install setuptools

      - name: Setup PNPM
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Test Everything evidence and resource contracts
        if: matrix.os == 'windows-2022'
        working-directory: packages/tuff-native
        run: node --test scripts/everything-selfcheck.test.js everything-resources.test.js

      - name: Rebuild Everything native addon for Node.js
        if: matrix.os == 'windows-2022'
        working-directory: packages/tuff-native
        run: pnpm run rebuild

      - name: Install verified Everything runtime
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: ./scripts/ci/setup-windows-everything.ps1

      - name: Collect real Everything SDK, CLI, and unavailable evidence
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: ./scripts/ci/collect-windows-everything-evidence.ps1 -SampleCount 200

      - name: Upload Windows Everything runtime evidence
        if: ${{ always() && matrix.os == 'windows-2022' }}
        uses: actions/upload-artifact@v7
        with:
          name: windows-everything-release-evidence
          if-no-files-found: error
          retention-days: 30
          overwrite: true
          path: |
            ${{ runner.temp }}/tuff-everything-runtime/setup-evidence.json
            ${{ runner.temp }}/tuff-everything-evidence/*.json

      - name: Clean up Everything service
        if: ${{ always() && matrix.os == 'windows-2022' }}
        shell: pwsh
        run: |
          if ($env:TUFF_EVERYTHING_EXE -and (Test-Path $env:TUFF_EVERYTHING_EXE)) {
            Start-Process -FilePath $env:TUFF_EVERYTHING_EXE -ArgumentList '-exit' -Wait -ErrorAction SilentlyContinue
            Start-Process -FilePath $env:TUFF_EVERYTHING_EXE -ArgumentList '-uninstall-service' -Wait -ErrorAction SilentlyContinue
          }
          Write-Host 'Everything cleanup finished.'

      - name: Fix Binary Permissions
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          echo "Fixing binary permissions for Linux build..."
          # 修复所有可能的二进制文件权限
          find . -name "app-builder" -type f -exec chmod +x {} \; 2>/dev/null || true
          find . -name "app-builder-bin" -type f -exec chmod +x {} \; 2>/dev/null || true
          find . -name "electron-builder" -type f -exec chmod +x {} \; 2>/dev/null || true
          find . -name "snapcraft" -type f -exec chmod +x {} \; 2>/dev/null || true
          echo "Binary permissions fixed"

      - name: Determine Release Type
        id: release-type
        shell: bash
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            # 标签触发：从标签提取版本信息
            REF_NAME_LOWER=$(echo "$REF_NAME" | tr '[:upper:]' '[:lower:]')
            if [[ "$REF_NAME_LOWER" == *"beta"* ]]; then
              echo "type=beta" >> $GITHUB_OUTPUT
            elif [[ "$REF_NAME_LOWER" == *"snapshot"* ]]; then
              echo "type=snapshot" >> $GITHUB_OUTPUT
            else
              echo "type=release" >> $GITHUB_OUTPUT
            fi
            echo "tag=$REF_NAME" >> $GITHUB_OUTPUT
            echo "version=${REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            # 手动触发：只设置构建类型，不处理版本和标签
            echo "type=$RELEASE_TYPE" >> $GITHUB_OUTPUT
            echo "tag=" >> $GITHUB_OUTPUT
            echo "version=" >> $GITHUB_OUTPUT
          fi
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          RELEASE_TYPE: ${{ github.event.inputs.release_type }}

      # Removed: Update Version Numbers step - no longer needed
      # Version numbers should be updated manually before creating tags

      - name: Prepare Build Environment
        shell: bash
        run: |
          # 确保输出目录存在
          mkdir -p apps/core-app/dist
          mkdir -p apps/core-app/dist/__appImage-x64
          mkdir -p apps/core-app/dist/__snap-x64
          mkdir -p apps/core-app/dist/__deb-x64
          mkdir -p apps/core-app/dist/@talex-touch
          mkdir -p "${GITHUB_WORKSPACE}/.cache/electron"
          mkdir -p "${GITHUB_WORKSPACE}/.cache/electron-builder"
          # 设置正确的权限
          chmod -R 755 apps/core-app/dist
          echo "Build directories prepared"

      - name: Set Build Environment Variables
        shell: bash
        run: |
          # GitHub Actions 自动提供 GITHUB_SHA
          echo "GITHUB_SHA is set: ${{ github.sha }}"
          echo "Setting Electron download/cache mirrors..."
          # TUFF_ENCRYPTION_KEY 从 secrets 中获取，如果不存在则为空（非官方构建）
          if [ -n "${{ secrets.TUFF_ENCRYPTION_KEY }}" ]; then
            echo "TUFF_ENCRYPTION_KEY is set (official build)"
          else
            echo "TUFF_ENCRYPTION_KEY is not set (unofficial build)"
          fi

      - name: Clean Previous Build Artifacts
        shell: bash
        run: |
          echo "Cleaning previous build artifacts..."
          # 清理可能存在的构建产物
          rm -rf apps/core-app/dist/__*
          rm -rf apps/core-app/dist/@talex-touch
          rm -rf apps/core-app/out
          # 清理 electron 下载/构建缓存
          rm -rf "${GITHUB_WORKSPACE}/.cache/electron"
          rm -rf "${GITHUB_WORKSPACE}/.cache/electron-builder"
          # 清理 node_modules 中的缓存
          rm -rf node_modules/.cache
          rm -rf apps/core-app/node_modules/.cache
          # 清理 electron-builder 和 Wine 缓存
          rm -rf apps/core-app/.electron-builder-cache
          rm -rf ~/.cache/electron-builder
          rm -rf ~/.electron-builder-cache
          echo "Build artifacts and caches cleaned"

      - name: Clean Windows Build Artifacts
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Write-Host "Cleaning previous Windows build artifacts..."
          $distPath = "apps/core-app/dist"
          if (Test-Path $distPath) {
            # 删除可能存在的安装程序文件
            Get-ChildItem -Path $distPath -Recurse -Include "*.exe", "*.msi", "*.7z" | Remove-Item -Force -ErrorAction SilentlyContinue
            # 删除 win-unpacked 目录
            $unpackedPath = Join-Path $distPath "win-unpacked"
            if (Test-Path $unpackedPath) {
              Remove-Item -Path $unpackedPath -Recurse -Force -ErrorAction SilentlyContinue
            }
            # 删除 @talex-touch 输出目录
            $outputPath = Join-Path $distPath "@talex-touch"
            if (Test-Path $outputPath) {
              Remove-Item -Path $outputPath -Recurse -Force -ErrorAction SilentlyContinue
            }
            # 删除 NSIS 临时文件
            Get-ChildItem -Path $distPath -Recurse -Include "__uninstaller-*" | Remove-Item -Force -ErrorAction SilentlyContinue
            # 删除缓存目录
            $cachePath = Join-Path $distPath ".electron-builder-cache"
            if (Test-Path $cachePath) {
              Remove-Item -Path $cachePath -Recurse -Force -ErrorAction SilentlyContinue
            }
          }
          Write-Host "Windows build artifacts cleaned"

      - name: Check Windows Disk Space and Write Permission
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Write-Host "Checking disk space and write permission..."
          Get-PSDrive -PSProvider 'FileSystem' | Select-Object Name, Free, Used, @{Name='FreeGB';Expression={[math]::Round($_.Free/1GB,2)}}
          $distPath = "apps/core-app/dist"
          if (-not (Test-Path $distPath)) { New-Item -ItemType Directory -Force -Path $distPath | Out-Null }
          $testFile = Join-Path $distPath "test-write.tmp"
          try {
            Set-Content -Path $testFile -Value "test" -Encoding ASCII
            Remove-Item -Path $testFile -Force
            Write-Host "Write permission verified"
          } catch {
            Write-Error "Write permission check failed: $($_.Exception.Message)"
            exit 1
          }

      - name: Prepare Windows Build Environment
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Write-Host "Preparing Windows build environment..."
          $distPath = "apps/core-app/dist"
          $outputPath = Join-Path $distPath "@talex-touch"

          # 确保输出目录存在
          if (-not (Test-Path $outputPath)) {
            New-Item -ItemType Directory -Force -Path $outputPath | Out-Null
            Write-Host "Created output directory: $outputPath"
          }

          # 设置目录权限（Windows 上确保可写）
          try {
            $testFile = Join-Path $outputPath "permission-test.tmp"
            Set-Content -Path $testFile -Value "test" -Encoding ASCII
            Remove-Item -Path $testFile -Force
            Write-Host "Output directory permissions verified"
          } catch {
            Write-Error "Output directory permission test failed: $($_.Exception.Message)"
            exit 1
          }

          Write-Host "Windows build environment prepared"

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          echo "Installing Linux build dependencies..."

          # 更新包列表
          sudo apt-get update -y

          # 安装基础构建工具和 uiohook/libuiohook 在 X11 环境下 rebuild 所需头文件
          sudo apt-get install -y \
            squashfs-tools \
            fakeroot \
            dpkg-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxrandr-dev \
            libxtst-dev \
            libxt-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxkbfile-dev \
            libxi-dev \
            libxext-dev

          # 跳过 snapcraft 安装，只构建 AppImage 和 Debian 包
          echo "Skipping snapcraft installation to avoid snapd issues"
          echo "Will build AppImage and Debian packages only"

          echo "Linux build dependencies installed successfully"

      - name: Prepare Linux Build Environment
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          echo "Preparing Linux build environment..."

          # 确保所有必要的目录存在（只创建需要的目录）
          mkdir -p apps/core-app/dist/__appImage-x64
          mkdir -p apps/core-app/dist/__deb-x64
          mkdir -p apps/core-app/dist/@talex-touch

          # 设置正确的权限
          chmod -R 755 apps/core-app/dist

          # 修复 app-builder 二进制文件权限
          echo "Fixing app-builder permissions..."
          find node_modules -name "app-builder" -type f -exec chmod +x {} \; 2>/dev/null || true
          find node_modules -name "app-builder-bin" -type f -exec chmod +x {} \; 2>/dev/null || true

          # 检查磁盘空间
          echo "Disk space check:"
          df -h

          echo "Linux build environment prepared successfully (AppImage + Debian only)"

      - name: Install macOS Dependencies
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          # macOS 通常不需要额外依赖，但可以检查 Xcode Command Line Tools
          xcode-select --install || echo "Xcode Command Line Tools already installed"
          echo "macOS build environment ready"

      - name: Resolve macOS Release Signing Mode
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          IFS=$'\t' read -r signing_mode notarization_method < <(
            node scripts/resolve-macos-release-signing-mode.mjs --format shell
          )
          echo "TUFF_MAC_NATIVE_SIGNING_MODE=${signing_mode}" >> "${GITHUB_ENV}"

          if [ "${signing_mode}" = "waived" ]; then
            echo "TUFF_OFFICIAL_RELEASE_BUILD=false" >> "${GITHUB_ENV}"
            echo "::warning title=macOS native signing waived::Apple Developer is not configured; publishing explicit ad-hoc risk evidence."
          else
            echo "TUFF_OFFICIAL_RELEASE_BUILD=true" >> "${GITHUB_ENV}"
            if [ "${notarization_method}" = "api-key" ]; then
              key_path="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"
              umask 077
              if [[ "${APPLE_API_KEY_CONTENT}" == -----BEGIN* ]]; then
                printf '%s' "${APPLE_API_KEY_CONTENT}" > "${key_path}"
              else
                printf '%s' "${APPLE_API_KEY_CONTENT}" | openssl base64 -d -A > "${key_path}"
              fi
              echo "APPLE_API_KEY=${key_path}" >> "${GITHUB_ENV}"
            fi
            echo "Developer ID signing enabled with ${notarization_method} notarization."
          fi

      - name: Build Tuff App
        shell: bash
        env:
          GITHUB_SHA: ${{ github.sha }}
          TUFF_ENCRYPTION_KEY: ${{ secrets.TUFF_ENCRYPTION_KEY }}
          RELEASE_SIGNING_PRIVATE_KEY: ${{ secrets.RELEASE_SIGNING_PRIVATE_KEY }}
          TUFF_RELEASE_ATTESTATION_REQUIRED: "true"
          RELEASE_TYPE: ${{ steps.release-type.outputs.type }}
          RUNNER_OS: ${{ runner.os }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ matrix.os == 'macos-latest' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_API_KEY_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_API_KEY_ID || '' }}
          APPLE_API_ISSUER: ${{ matrix.os == 'macos-latest' && secrets.APPLE_API_ISSUER || '' }}
          APPLE_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_TEAM_ID || '' }}
        run: |
          set -e  # Exit immediately if a command exits with a non-zero status

          echo "Starting build process for $RUNNER_OS..."
          echo "Current directory: $(pwd)"
          echo "RELEASE_TYPE: $RELEASE_TYPE"
          echo "RUNNER_OS: $RUNNER_OS"
          echo "GITHUB_SHA: $GITHUB_SHA"

          # 检查构建环境
          echo "Checking build environment..."
          echo "Node version: $(node --version)"
          echo "pnpm version: $(pnpm --version)"

          # 检查 dist 目录
          echo "Checking dist directory before build:"
          if [ -d "apps/core-app/dist" ]; then
            echo "Dist directory exists, cleaning..."
            rm -rf apps/core-app/dist/* || echo "Cannot clean dist (may be empty)"
          else
            echo "Dist directory does not exist (will be created)"
          fi

          # 执行构建
          BUILD_FAILED=false
          set +e  # Temporarily disable exit on error to capture build failure
          if [ "$RELEASE_TYPE" = "beta" ]; then
            if [ "$RUNNER_OS" = "Windows" ]; then
              echo "Building Windows beta..."
              echo "Running: pnpm build:beta:win"
              pnpm build:beta:win || {
                BUILD_FAILED=true
                echo "ERROR: Windows beta build failed with exit code $?"
              }
            elif [ "$RUNNER_OS" = "macOS" ]; then
              echo "Building macOS beta..."
              echo "Using NODE_OPTIONS=--max-old-space-size=6144 for macOS beta build"
              NODE_OPTIONS="--max-old-space-size=6144" SKIP_INSTALL_APP_DEPS=true pnpm build:beta:mac || {
                BUILD_FAILED=true
                echo "ERROR: macOS beta build failed with exit code $?"
              }
            else
              echo "Building Linux beta..."
              pnpm build:beta:linux || {
                BUILD_FAILED=true
                echo "ERROR: Linux beta build failed with exit code $?"
              }
            fi
          elif [ "$RELEASE_TYPE" = "snapshot" ]; then
            if [ "$RUNNER_OS" = "Windows" ]; then
              echo "Building Windows snapshot..."
              echo "Running: pnpm build:snapshot:win"
              pnpm build:snapshot:win || {
                BUILD_FAILED=true
                echo "ERROR: Windows snapshot build failed with exit code $?"
              }
            elif [ "$RUNNER_OS" = "macOS" ]; then
              echo "Building macOS snapshot..."
              echo "Using NODE_OPTIONS=--max-old-space-size=6144 for macOS snapshot build"
              NODE_OPTIONS="--max-old-space-size=6144" SKIP_INSTALL_APP_DEPS=true pnpm build:snapshot:mac || {
                BUILD_FAILED=true
                echo "ERROR: macOS snapshot build failed with exit code $?"
              }
            else
              echo "Building Linux snapshot..."
              pnpm build:snapshot:linux || {
                BUILD_FAILED=true
                echo "ERROR: Linux snapshot build failed with exit code $?"
              }
            fi
          else
            echo "Building release version..."
            if [ "$RUNNER_OS" = "Windows" ]; then
              echo "Building Windows release..."
              pnpm build:release:win || {
                BUILD_FAILED=true
                echo "ERROR: Windows release build failed with exit code $?"
              }
            elif [ "$RUNNER_OS" = "macOS" ]; then
              echo "Building macOS release..."
              echo "Using NODE_OPTIONS=--max-old-space-size=6144 for macOS release build"
              NODE_OPTIONS="--max-old-space-size=6144" SKIP_INSTALL_APP_DEPS=true pnpm build:release:mac || {
                BUILD_FAILED=true
                echo "ERROR: macOS release build failed with exit code $?"
              }
            else
              echo "Building Linux release..."
              pnpm build:release:linux || {
                BUILD_FAILED=true
                echo "ERROR: Linux release build failed with exit code $?"
              }
            fi
          fi
          set -e  # Re-enable exit on error

          # 验证构建输出
          echo ""
          echo "Verifying build output..."

          if [ "$BUILD_FAILED" = "true" ]; then
            echo "ERROR: Build step reported failure!"
            if [ -d "apps/core-app/dist" ]; then
              echo "Checking for partial build artifacts..."
              find apps/core-app/dist -type f 2>/dev/null | head -20 || echo "Cannot list files"
            fi
            exit 1
          fi

          if [ ! -d "apps/core-app/dist" ]; then
            echo "ERROR: Dist directory was not created!"
            echo "Checking if build directory exists:"
            ls -la apps/core-app/ || echo "Cannot list core-app directory"
            exit 1
          fi

          echo "✓ Dist directory exists"

          # 检查文件数量
          FILE_COUNT=$(find apps/core-app/dist -type f 2>/dev/null | wc -l || echo "0")
          echo "Total files in dist: $FILE_COUNT"

          if [ "$FILE_COUNT" = "0" ]; then
            echo "ERROR: Dist directory exists but is empty!"
            echo "Build may have failed silently. Checking dist structure:"
            ls -la apps/core-app/dist/ || echo "Cannot list dist contents"
            echo ""
            echo "Checking for any files in subdirectories:"
            find apps/core-app/dist -type f -o -type d 2>/dev/null | head -20 || echo "No files found"
            exit 1
          fi

          echo "Dist directory contents:"
          ls -la apps/core-app/dist/ || echo "Cannot list dist contents"

          echo ""
          echo "Searching for build artifacts:"
          ARTIFACTS_FOUND=false

          if [ "$RUNNER_OS" = "Windows" ]; then
            EXE_COUNT=$(find apps/core-app/dist -name "*.exe" -type f 2>/dev/null | wc -l || echo "0")
            echo "Found $EXE_COUNT .exe file(s)"
            if [ "$EXE_COUNT" -gt 0 ]; then
              find apps/core-app/dist -name "*.exe" -type f 2>/dev/null
              ARTIFACTS_FOUND=true
            fi
          elif [ "$RUNNER_OS" = "macOS" ]; then
            # Check for .dmg files, .app directories, and .zip files (zip contains .app)
            DMG_COUNT=$(find apps/core-app/dist -name "*.dmg" -type f 2>/dev/null | wc -l || echo "0")
            APP_COUNT=$(find apps/core-app/dist -name "*.app" -type d -path "*/mac-*/*" 2>/dev/null | wc -l || echo "0")
            ZIP_COUNT=$(find apps/core-app/dist -name "*.zip" -type f 2>/dev/null | wc -l || echo "0")
            echo "Found $DMG_COUNT .dmg file(s), $APP_COUNT .app directory/directories, and $ZIP_COUNT .zip file(s)"
            if [ "$DMG_COUNT" -gt 0 ]; then
              find apps/core-app/dist -name "*.dmg" -type f 2>/dev/null
              ARTIFACTS_FOUND=true
            fi
            if [ "$APP_COUNT" -gt 0 ]; then
              find apps/core-app/dist -name "*.app" -type d -path "*/mac-*/*" 2>/dev/null
              ARTIFACTS_FOUND=true
            fi
            if [ "$ZIP_COUNT" -gt 0 ]; then
              find apps/core-app/dist -name "*.zip" -type f 2>/dev/null
              ARTIFACTS_FOUND=true
            fi
          else
            APPIMAGE_COUNT=$(find apps/core-app/dist -name "*.AppImage" -type f 2>/dev/null | wc -l || echo "0")
            DEB_COUNT=$(find apps/core-app/dist -name "*.deb" -type f 2>/dev/null | wc -l || echo "0")
            SNAP_COUNT=$(find apps/core-app/dist -name "*.snap" -type f 2>/dev/null | wc -l || echo "0")
            echo "Found $APPIMAGE_COUNT .AppImage, $DEB_COUNT .deb, $SNAP_COUNT .snap file(s)"
            if [ "$APPIMAGE_COUNT" -gt 0 ] || [ "$DEB_COUNT" -gt 0 ] || [ "$SNAP_COUNT" -gt 0 ]; then
              find apps/core-app/dist \( -name "*.AppImage" -o -name "*.deb" -o -name "*.snap" \) -type f 2>/dev/null
              ARTIFACTS_FOUND=true
            fi
          fi

          if [ "$ARTIFACTS_FOUND" = "false" ]; then
            if [ "$RUNNER_OS" = "Windows" ]; then
              echo "ERROR: No .exe files found in dist directory!"
            elif [ "$RUNNER_OS" = "macOS" ]; then
              echo "ERROR: No .dmg files, .app directories, or .zip files found in dist directory!"
            else
              echo "ERROR: No Linux artifacts (.AppImage, .deb, or .snap) found in dist directory!"
            fi
            echo "This may indicate the electron-builder step failed silently."
            echo "Check the electron-builder output above for errors."
            exit 1
          fi

          echo ""
          echo "✓ Build completed successfully"

      - name: Verify macOS Release Signing
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          app_bundles=()
          while IFS= read -r app_bundle; do
            app_bundles+=("${app_bundle}")
          done < <(find apps/core-app/dist -type d -name "*.app" -prune -print | sort)
          if [ "${#app_bundles[@]}" -ne 1 ]; then
            echo "Expected exactly one macOS app bundle, found ${#app_bundles[@]}."
            printf '  %s\n' "${app_bundles[@]}"
            exit 1
          fi

          node apps/core-app/scripts/verify-macos-release-signing.mjs \
            --mode "${TUFF_MAC_NATIVE_SIGNING_MODE:-waived}" \
            --app-bundle "${app_bundles[0]}" \
            --output apps/core-app/dist/release-signing-evidence.json

      - name: Cleanup macOS Notarization Credential File
        if: always() && matrix.os == 'macos-latest'
        shell: bash
        run: |
          if [ -n "${APPLE_API_KEY:-}" ]; then
            rm -f "${APPLE_API_KEY}"
          fi

      - name: Verify Build Artifacts
        shell: bash
        run: |
          echo "Verifying build artifacts for $RUNNER_OS..."
          if [ -d "apps/core-app/dist" ]; then
            echo "Build artifacts found:"
            find apps/core-app/dist -type f -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.snap" -o -name "*.deb" | head -10
            echo "Total files in dist:"
            find apps/core-app/dist -type f | wc -l
          else
            echo "ERROR: No dist directory found!"
            exit 1
          fi

      - name: Assert Windows Installer Exists
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $distPath = "apps/core-app/dist"
          $packageJsonPath = "apps/core-app/package.json"
          $expectedVersion = (Get-Content -Path $packageJsonPath -Raw | ConvertFrom-Json).version
          if ([string]::IsNullOrWhiteSpace($expectedVersion)) {
            Write-Error "CoreApp package version is missing: $packageJsonPath"
            exit 1
          }
          Write-Host "Checking for Windows installer in: $distPath"
          Write-Host "Directory exists: $(Test-Path $distPath)"

          if (-not (Test-Path $distPath)) {
            Write-Error "Dist directory does not exist: $distPath"
            exit 1
          }

          Write-Host ""
          Write-Host "Listing all .exe files in dist:"
          $allExeFiles = Get-ChildItem -Path $distPath -Recurse -Include "*.exe" -ErrorAction SilentlyContinue

          if ($null -eq $allExeFiles -or $allExeFiles.Count -eq 0) {
            Write-Host "  No .exe files found"
            Write-Host ""
            Write-Host "Checking if dist directory is empty..."
            $allFiles = Get-ChildItem -Path $distPath -Recurse -ErrorAction SilentlyContinue
            if ($null -eq $allFiles -or $allFiles.Count -eq 0) {
              Write-Error "Dist directory exists but is empty. Build may have failed silently."
              Write-Host "Build artifacts check failed. Please review the build step output above."
              exit 1
            } else {
              Write-Host "Found $($allFiles.Count) files in dist (but no .exe files):"
              $allFiles | Select-Object -First 10 FullName, PSIsContainer | Format-Table -AutoSize
            }
          } else {
            $allExeFiles | ForEach-Object {
              $fileSize = [math]::Round($_.Length / 1MB, 2)
              Write-Host "  - $($_.Name) (Size: $fileSize MB, Path: $($_.FullName))"
            }
          }

          Write-Host ""
          Write-Host "Searching for installer with pattern: *-setup.exe"
          $exists = $null

          if ($null -ne $allExeFiles -and $allExeFiles.Count -gt 0) {
            $exists = $allExeFiles | Where-Object { $_.Name -like "*-setup.exe" -or $_.Name -match "-setup\.exe$" }
          }

          if ($null -eq $exists -or $exists.Count -eq 0) {
            Write-Host ""
            Write-Host "Trying alternative search patterns..."

            if ($null -ne $allExeFiles -and $allExeFiles.Count -gt 0) {
              $alt1 = $allExeFiles | Where-Object { $_.Name -like "*setup*.exe" }
              $alt2 = $allExeFiles | Where-Object { $_.Name -like "talex-touch*.exe" }

              if ($null -ne $alt1 -and $alt1.Count -gt 0) {
                Write-Host "Found files matching *setup*.exe:"
                $alt1 | Select-Object FullName, Name | Format-Table -AutoSize
              }

              if ($null -ne $alt2 -and $alt2.Count -gt 0) {
                Write-Host "Found files matching talex-touch*.exe:"
                $alt2 | Select-Object FullName, Name | Format-Table -AutoSize
              }
            }

            Write-Error "NSIS installer not found (*.exe with -setup) in $distPath"
            Write-Host ""
            Write-Host "Full directory structure:"
            Get-ChildItem -Path $distPath -Recurse | Select-Object FullName, PSIsContainer | Format-Table -AutoSize
            exit 1
          } else {
            Write-Host ""
            Write-Host "Found installer(s):"
            $exists | ForEach-Object {
              $fileSize = [math]::Round($_.Length / 1MB, 2)
              Write-Host "  - $($_.FullName) (Size: $fileSize MB)"
            }
          }
          $expectedInstallerName = "tuff-$expectedVersion-setup.exe"
          $versionedInstaller = $exists | Where-Object { $_.Name -eq $expectedInstallerName }
          if ($null -eq $versionedInstaller -or $versionedInstaller.Count -eq 0) {
            Write-Error "Expected versioned installer not found: $expectedInstallerName"
            exit 1
          }

          $latestMetadata = Get-ChildItem -Path $distPath -Recurse -File -Filter "latest.yml" -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if ($null -eq $latestMetadata) {
            Write-Error "Windows updater metadata latest.yml was not generated."
            exit 1
          }

          $versionMatch = Select-String -Path $latestMetadata.FullName -Pattern '^version:\s*(.+)\s*$' |
            Select-Object -First 1
          if ($null -eq $versionMatch) {
            Write-Error "Windows updater metadata has no version field: $($latestMetadata.FullName)"
            exit 1
          }

          $metadataVersion = $versionMatch.Matches[0].Groups[1].Value.Trim()
          if ($metadataVersion -ne $expectedVersion) {
            Write-Error "Windows updater version mismatch: expected $expectedVersion, got $metadataVersion"
            exit 1
          }

          Write-Host "Windows installer and updater metadata match CoreApp version: $expectedVersion"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os }}-${{ steps.release-type.outputs.type }}
          path: |
            apps/core-app/dist/**/*-setup.exe
            apps/core-app/dist/**/*.dmg
            apps/core-app/dist/**/*.AppImage
            apps/core-app/dist/**/*.deb
            apps/core-app/dist/**/*.snap
            apps/core-app/dist/**/*.zip
            apps/core-app/dist/**/latest*.yml
            apps/core-app/dist/**/builder-debug.yml
            apps/core-app/dist/release-signing-evidence.json
          retention-days: 30
          if-no-files-found: error

      - name: Cleanup Artifacts for Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $distPath = "apps/core-app/dist"
          if (-not (Test-Path $distPath)) {
            Write-Host "Dist path not found: $distPath"
            exit 0
          }

          Write-Host "Cleaning Windows artifacts (keeping .exe files only)..."

          # Remove all non-.exe files
          Get-ChildItem -Path $distPath -Recurse -File -Force |
            Where-Object { $_.Extension -ne ".exe" } |
            Remove-Item -Force -ErrorAction SilentlyContinue

          # Remove empty directories (bottom-up)
          Get-ChildItem -Path $distPath -Recurse -Directory -Force |
            Sort-Object FullName -Descending |
            ForEach-Object {
              if (-not (Get-ChildItem -Path $_.FullName -Force -ErrorAction SilentlyContinue)) {
                Remove-Item -Path $_.FullName -Force -ErrorAction SilentlyContinue
              }
            }

      - name: Cleanup Artifacts for MacOS
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          # Keep .dmg files, .zip files (contain .app), and .app directories
          find apps/core-app/dist -type f ! -name "*.dmg" ! -name "*.zip" -delete 2>/dev/null || true
          find apps/core-app/dist -type d -name "mac-*" -prune -o -type d ! -name "*.app" -empty -delete 2>/dev/null || true

  create-release:
    name: Create Release
    needs: build-and-release
    runs-on: ubuntu-latest
    if: needs.build-and-release.result == 'success'
    permissions:
      contents: write

    steps:
      - name: Check Build Results
        run: |
          echo "Build results:"
          echo "Windows: ${{ needs.build-and-release.result == 'success' }}"
          echo "macOS: ${{ needs.build-and-release.result == 'success' }}"
          echo "Linux: ${{ needs.build-and-release.result == 'success' }}"

      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Fix macOS App Permissions After Download
        shell: bash
        run: |
          # GitHub Actions upload-artifact automatically compresses to zip
          # We need to extract and fix permissions after download
          echo "Fixing macOS app permissions after artifact extraction..."
          echo "Searching for .app directories in artifacts..."

          # Find all .app directories (they may be in subdirectories after extraction)
          # Try multiple path patterns
          APP_FOUND=false
          while IFS= read -r app_dir; do
            if [ -d "$app_dir" ]; then
              APP_FOUND=true
              echo "Found .app directory: $app_dir"
              echo "Fixing permissions for: $app_dir"

              # Fix main executable
              if [ -f "$app_dir/Contents/MacOS/tuff" ]; then
                chmod +x "$app_dir/Contents/MacOS/tuff"
                echo "  ✓ Fixed main executable permissions"
              fi

              # Fix all Framework executables
              if [ -d "$app_dir/Contents/Frameworks" ]; then
                find "$app_dir/Contents/Frameworks" -type f ! -name "*.dylib" ! -name "*.plist" -exec chmod +x {} \;
                echo "  ✓ Fixed Framework executable permissions"
              fi

              # Remove quarantine attribute (if on macOS)
              if [ "$(uname)" = "Darwin" ]; then
                xattr -dr com.apple.quarantine "$app_dir" 2>/dev/null || true
                echo "  ✓ Removed quarantine attribute"
              fi
            fi
          done < <(find artifacts -type d -name "*.app" 2>/dev/null | sort)

          if [ "$APP_FOUND" = "false" ]; then
            echo "⚠️  No .app directories found in artifacts/"
            echo "Listing artifacts directory structure:"
            find artifacts -type d -maxdepth 3 | head -20
          else
            echo "✓ macOS app permissions fixed"
          fi

      - name: Determine Release Type and Tag
        id: release-info
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            # 标签触发：使用标签信息创建 release
            REF_NAME_LOWER=$(echo "$REF_NAME" | tr '[:upper:]' '[:lower:]')
            echo "type=release" >> $GITHUB_OUTPUT
            echo "tag=$REF_NAME" >> $GITHUB_OUTPUT
            echo "name=Release $REF_NAME" >> $GITHUB_OUTPUT
            if [[ "$REF_NAME_LOWER" == *"beta"* || "$REF_NAME_LOWER" == *"snapshot"* ]]; then
              echo "prerelease=true" >> $GITHUB_OUTPUT
            else
              echo "prerelease=false" >> $GITHUB_OUTPUT
            fi
          else
            # 手动触发：创建 draft release，使用时间戳作为临时标签
            # 标签会被 release action 自动创建，但因为是 draft，不会正式发布
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            echo "type=$RELEASE_TYPE" >> $GITHUB_OUTPUT
            echo "tag=manual-build-$TIMESTAMP" >> $GITHUB_OUTPUT
            echo "name=Manual Build ($RELEASE_TYPE) - $TIMESTAMP" >> $GITHUB_OUTPUT
            if [ "$RELEASE_TYPE" = "snapshot" ] || [ "$RELEASE_TYPE" = "beta" ]; then
              echo "prerelease=true" >> $GITHUB_OUTPUT
            else
              echo "prerelease=false" >> $GITHUB_OUTPUT
            fi
          fi

        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          RELEASE_TYPE: ${{ github.event.inputs.release_type }}
      - name: Resolve same-channel rollback version
        id: rollback
        shell: bash
        run: |
          set -euo pipefail
          rollback=$(node scripts/resolve-update-rollback-version.mjs \
            --tag "${{ steps.release-info.outputs.tag }}" \
            --remote origin)
          {
            echo "from_version=$(jq -er '.rollbackFromVersion' <<<"${rollback}")"
            echo "channel=$(jq -er '.channel' <<<"${rollback}")"
          } >> "$GITHUB_OUTPUT"

      - name: List Available Artifacts
        run: |
          echo "Available artifacts:"
          find artifacts -type f \( -name "*-setup.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.snap" -o -name "*.deb" -o -name "*.zip" \) ! -path "*/win-unpacked/*" ! -name "__uninstaller-*.exe" | sort
          find artifacts -type d -name "*.app" -path "*/mac-*/*" | sort
          echo "Total files:"
          find artifacts -type f | wc -l
          echo "Total .app directories:"
          find artifacts -type d -name "*.app" -path "*/mac-*/*" | wc -l
          echo "Total .zip files:"
          find artifacts -type f -name "*.zip" | wc -l

      - name: Validate Release Signing Trust Roots
        run: node scripts/check-release-signing-trust-roots.mjs

      - name: Collect Release Assets
        id: release-files
        env:
          TAG: ${{ steps.release-info.outputs.tag }}
          RELEASE_TYPE: ${{ steps.release-info.outputs.type }}
          RELEASE_SIGNING_PRIVATE_KEY: ${{ secrets.RELEASE_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          # Collect files (exclude raw win-unpacked executables to avoid broken standalone EXE release)
          mapfile -t FILES < <(
            find artifacts -type f \
              \( -name "*-setup.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.snap" -o -name "*.deb" -o -name "*.zip" -o -name "latest*.yml" -o -name "builder-debug.yml" \) \
              ! -path "*/win-unpacked/*" \
              ! -name "__uninstaller-*.exe" \
              | sort
          )

          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No release files found in artifacts/"
            exit 1
          fi

          WINDOWS_INSTALLER_COUNT=$(printf "%s\n" "${FILES[@]}" | grep -Ec -- '-setup\.exe$' || true)
          if [ "${WINDOWS_INSTALLER_COUNT}" -eq 0 ]; then
            echo "No Windows installer (*-setup.exe) found. Refusing to publish raw executable."
            echo "Detected exe files:"
            find artifacts -type f -name "*.exe" | sort || true
            exit 1
          fi

          mkdir -p release-assets
          declare -a OUTPUT_PATHS=()

          # Process files (including zip files)
          for file in "${FILES[@]}"; do
            relative=${file#artifacts/}
            platform=${relative%%/*}
            if [[ "$platform" == "$relative" ]]; then
              platform="common"
            fi

            base=$(basename "$file")
            target="release-assets/${platform}-${base}"
            counter=1
            while [ -e "$target" ]; do
              counter=$((counter + 1))
              target="release-assets/${platform}-${counter}-${base}"
            done

            cp "$file" "$target"
            OUTPUT_PATHS+=("$target")
          done

          CHANNEL="${{ steps.rollback.outputs.channel }}"
          ROLLBACK_FROM_VERSION="${{ steps.rollback.outputs.from_version }}"

          if [ -z "${RELEASE_SIGNING_PRIVATE_KEY}" ]; then
            echo "RELEASE_SIGNING_PRIVATE_KEY is required for official release assets."
            exit 1
          fi

          signing_key_path="${RUNNER_TEMP}/tuff-release-signing-private.pem"
          trap 'rm -f "${signing_key_path}"' EXIT
          umask 077
          if [[ "${RELEASE_SIGNING_PRIVATE_KEY}" == -----BEGIN* ]]; then
            printf '%s' "${RELEASE_SIGNING_PRIVATE_KEY}" > "${signing_key_path}"
          else
            printf '%s' "${RELEASE_SIGNING_PRIVATE_KEY}" | base64 --decode > "${signing_key_path}"
          fi

          ROLLBACK_COMPATIBLE="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.rollback_compatible || 'false' }}"
          ROLLBACK_EVIDENCE="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.rollback_evidence || '' }}"
          ROLLBACK_EVIDENCE_SIGNATURE="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.rollback_evidence_signature || '' }}"
          case "${ROLLBACK_COMPATIBLE}" in
            true)
              if [ -z "${ROLLBACK_EVIDENCE}" ] || [ -z "${ROLLBACK_EVIDENCE_SIGNATURE}" ]; then
                echo "rollbackCompatible=true requires rollback_evidence and rollback_evidence_signature."
                exit 1
              fi
              if [ ! -f "${ROLLBACK_EVIDENCE}" ] || [ ! -f "${ROLLBACK_EVIDENCE_SIGNATURE}" ]; then
                echo "Configured rollback evidence or detached signature file is missing."
                exit 1
              fi
              rollback_evidence_args=(
                --rollback-evidence "${ROLLBACK_EVIDENCE}"
                --rollback-evidence-signature "${ROLLBACK_EVIDENCE_SIGNATURE}"
              )
              ;;
            false) rollback_evidence_args=() ;;
            *)
              echo "rollback_compatible must be true or false."
              exit 1
              ;;
          esac

          node scripts/prepare-release-assets.mjs \
            --tag "${TAG}" \
            --channel "${CHANNEL}" \
            --rollback-from-version "${ROLLBACK_FROM_VERSION}" \
            --expected-rollback-from-version "${ROLLBACK_FROM_VERSION}" \
            --rollback-compatible "${ROLLBACK_COMPATIBLE}" \
            "${rollback_evidence_args[@]}" \
            --release-dir release-assets \
            --private-key "${signing_key_path}" \
            --public-key apps/core-app/resources/keys/release-signing-public.pem \
            --manifest release-assets/tuff-release-manifest.json

          node scripts/update-validate-release-manifest.mjs \
            --manifest release-assets/tuff-release-manifest.json \
            --expected-rollback-from-version "${ROLLBACK_FROM_VERSION}"

          mapfile -t SIGNATURE_PATHS < <(find release-assets -maxdepth 1 -type f -name "*.sig" | sort)
          if [ "${#SIGNATURE_PATHS[@]}" -eq 0 ]; then
            echo "No detached signature sidecars were generated."
            exit 1
          fi
          OUTPUT_PATHS+=("${SIGNATURE_PATHS[@]}")
          OUTPUT_PATHS+=("release-assets/tuff-release-manifest.json")
          OUTPUT_PATHS+=("release-assets/release-test-summary.json")
          OUTPUT_PATHS+=("release-assets/release-test-summary.md")

          {
            echo "files<<EOF"
            for path in "${OUTPUT_PATHS[@]}"; do
              echo "$path"
            done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate Release Notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/generate-release-notes.mjs \
            --tag "${{ steps.release-info.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --target-ref "${{ github.sha }}" \
            --output-dir "generated-release-notes"

      - name: Generate Release Test Summary
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t mac_evidence_files < <(find artifacts -type f -name "release-signing-evidence.json" | sort)
          if [ "${#mac_evidence_files[@]}" -ne 1 ]; then
            echo "Expected exactly one macOS signing evidence file, found ${#mac_evidence_files[@]}."
            exit 1
          fi

          set +e
          node scripts/generate-release-test-summary.mjs \
            --release-dir release-assets \
            --manifest release-assets/tuff-release-manifest.json \
            --public-key apps/core-app/resources/keys/release-signing-public.pem \
            --mac-evidence "${mac_evidence_files[0]}" \
            --output-dir release-assets
          summary_status=$?
          set -e

          if [ -f release-assets/release-test-summary.md ]; then
            cat release-assets/release-test-summary.md >> "${GITHUB_STEP_SUMMARY}"
          fi
          exit "${summary_status}"

      - name: Create Release
        id: create-release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release-info.outputs.tag }}
          name: ${{ steps.release-info.outputs.name }}
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          prerelease: ${{ steps.release-info.outputs.prerelease == 'true' }}
          files: ${{ steps.release-files.outputs.files }}
          fail_on_unmatched_files: true
          body_path: generated-release-notes/release-notes.github.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-nexus-release:
    name: Sync Nexus Release
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: >
      always() && (
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && needs.create-release.result == 'success')
        || (github.event_name == 'workflow_dispatch' && github.event.inputs.sync_tag != '')
      )
    env:
      NEXUS_BASE_URL: ${{ vars.NEXUS_SYNC_BASE_URL || 'https://tuff.tagzxia.com' }}
      NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}
      NEXUS_CF_ACCESS_CLIENT_ID: ${{ vars.ADMIN_CF_ACCESS_CLIENT_ID || secrets.ADMIN_CF_ACCESS_CLIENT_ID }}
      NEXUS_CF_ACCESS_CLIENT_SECRET: ${{ vars.ADMIN_CF_ACCESS_CLIENT_SECRET || secrets.ADMIN_CF_ACCESS_CLIENT_SECRET }}
      TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.sync_tag || github.ref_name }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Validate Nexus sync credentials
        run: |
          if [ -z "${NEXUS_API_KEY}" ]; then
            echo "NEXUS_API_KEY is required for release sync."
            exit 1
          fi

      - name: Validate sync tag
        run: |
          if [ -z "${TAG}" ]; then
            echo "TAG is required for release sync."
            exit 1
          fi

          if ! echo "${TAG}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([-.].*)?$'; then
            echo "Invalid TAG format: ${TAG}. Expected format like v2.4.7"
            exit 1
          fi

      - name: Resolve release metadata
        id: meta
        run: |
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Resolve same-channel rollback version
        id: sync-rollback
        shell: bash
        run: |
          set -euo pipefail
          rollback=$(node scripts/resolve-update-rollback-version.mjs --tag "${TAG}" --remote origin)
          {
            echo "from_version=$(jq -er '.rollbackFromVersion' <<<"${rollback}")"
            echo "channel=$(jq -er '.channel' <<<"${rollback}")"
          } >> "$GITHUB_OUTPUT"

      - name: Fetch GitHub release metadata
        run: |
          curl -sS \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" \
            -o /tmp/github-release.json

          jq -e '.id and (.assets | type == "array")' /tmp/github-release.json >/dev/null

      - name: Download and validate release manifest
        shell: bash
        run: |
          set -euo pipefail
          manifest_url=$(jq -er 'first(.assets[] | select(.name=="tuff-release-manifest.json")).browser_download_url' /tmp/github-release.json)
          curl -sSL -f \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "${manifest_url}" \
            -o /tmp/tuff-release-manifest.json
          node scripts/update-validate-release-manifest.mjs \
            --manifest /tmp/tuff-release-manifest.json \
            --expected-rollback-from-version "${{ steps.sync-rollback.outputs.from_version }}"
          jq -e --arg tag "${TAG}" '.release.tag == $tag' /tmp/tuff-release-manifest.json >/dev/null

      - name: Generate Release Notes
        run: |
          node scripts/generate-release-notes.mjs \
            --tag "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --target-ref "${GITHUB_SHA}" \
            --output-dir "/tmp/generated-release-notes"

      - name: Resolve release notes payload
        run: |
          set -euo pipefail

          VERSION="${{ steps.meta.outputs.version }}"
          NOTES_BASE="notes/update_${VERSION}"

          fallback_body=$(jq -r '.body // ""' /tmp/github-release.json)
          fallback_body="${fallback_body//$'\r'/}"
          if [ -z "${fallback_body//[[:space:]]/}" ]; then
            fallback_body="Release ${TAG}"
          fi

          generated_zh="/tmp/generated-release-notes/update_${VERSION}.zh.md"
          generated_en="/tmp/generated-release-notes/update_${VERSION}.en.md"

          notes_zh="${fallback_body}"
          notes_en="${fallback_body}"

          if [ -f "${generated_zh}" ]; then
            notes_zh=$(cat "${generated_zh}")
          fi

          if [ -f "${generated_en}" ]; then
            notes_en=$(cat "${generated_en}")
          fi

          if [ -f "${NOTES_BASE}.md" ]; then
            shared_body=$(cat "${NOTES_BASE}.md")
            notes_zh="${shared_body}"
            notes_en="${shared_body}"
          fi

          if [ -f "${NOTES_BASE}.zh.md" ]; then
            notes_zh=$(cat "${NOTES_BASE}.zh.md")
          fi

          if [ -f "${NOTES_BASE}.en.md" ]; then
            notes_en=$(cat "${NOTES_BASE}.en.md")
          fi

          render_markdown() {
            local content="$1"

            if [ -z "${content//[[:space:]]/}" ]; then
              echo ""
              return
            fi

            local payload
            payload=$(jq -nc \
              --arg text "${content}" \
              --arg context "${GITHUB_REPOSITORY}" \
              '{text: $text, mode: "gfm", context: $context}')

            curl -sS \
              -X POST "https://api.github.com/markdown" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              -d "${payload}"
          }

          notes_html_zh=$(render_markdown "${notes_zh}")
          if [ "${notes_en}" = "${notes_zh}" ]; then
            notes_html_en="${notes_html_zh}"
          else
            notes_html_en=$(render_markdown "${notes_en}")
          fi

          notes_json=$(jq -nc --arg zh "${notes_zh}" --arg en "${notes_en}" '{zh: $zh, en: $en}')
          notes_html_json=$(jq -nc --arg zh "${notes_html_zh}" --arg en "${notes_html_en}" '{zh: $zh, en: $en}')

          printf '%s' "${notes_json}" > /tmp/nexus-release-notes.json
          printf '%s' "${notes_html_json}" > /tmp/nexus-release-notes-html.json

      - name: Prepare Nexus sync helpers
        run: |
          cat >/tmp/nexus-sync-helpers.sh <<'EOF'
          set -euo pipefail

          create_nexus_headers() {
            local -n output_headers="$1"
            output_headers=(
              -H "Authorization: Bearer ${NEXUS_API_KEY}"
              -H "Accept: application/json"
              -H "User-Agent: tuff-release-sync/1.0"
            )

            if [ -n "${NEXUS_CF_ACCESS_CLIENT_ID:-}" ] && [ -n "${NEXUS_CF_ACCESS_CLIENT_SECRET:-}" ]; then
              output_headers+=(
                -H "CF-Access-Client-Id: ${NEXUS_CF_ACCESS_CLIENT_ID}"
                -H "CF-Access-Client-Secret: ${NEXUS_CF_ACCESS_CLIENT_SECRET}"
              )
            fi
          }

          response_is_json() {
            local file_path="$1"
            jq -e . "${file_path}" >/dev/null 2>&1
          }

          response_has_status_message() {
            local file_path="$1"
            local expected="$2"
            jq -e --arg expected "${expected}" '.statusMessage? == $expected' "${file_path}" >/dev/null 2>&1
          }

          assert_nexus_response_ok() {
            local file_path="$1"
            local http_code="$2"
            local shape_jq="${3:-.}"

            if ! response_is_json "${file_path}"; then
              cat "${file_path}"
              return 1
            fi

            if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
              cat "${file_path}"
              return 1
            fi

            if ! jq -e "${shape_jq}" "${file_path}" >/dev/null 2>&1; then
              cat "${file_path}"
              return 1
            fi
          }
          EOF

      - name: Upsert Nexus release metadata
        run: |
          source /tmp/nexus-sync-helpers.sh
          notes_json=$(cat /tmp/nexus-release-notes.json)
          notes_html_json=$(cat /tmp/nexus-release-notes-html.json)
          nexus_headers=()
          create_nexus_headers nexus_headers
          rollback_from_version=$(jq -er '.release.rollbackFromVersion' /tmp/tuff-release-manifest.json)
          rollback_compatible=$(jq -er '.release.rollbackCompatible' /tmp/tuff-release-manifest.json)


          create_payload=$(jq -n \
            --arg tag "${TAG}" \
            --arg name "Release ${TAG}" \
            --arg channel "${{ steps.sync-rollback.outputs.channel }}" \
            --arg version "${{ steps.meta.outputs.version }}" \
            --arg rollbackFromVersion "${rollback_from_version}" \
            --argjson rollbackCompatible "${rollback_compatible}" \
            --argjson notes "${notes_json}" \
            --argjson notesHtml "${notes_html_json}" \
            '{
              tag: $tag,
              name: $name,
              channel: $channel,
              version: $version,
              rollbackFromVersion: $rollbackFromVersion,
              rollbackCompatible: $rollbackCompatible,
              notes: $notes,
              notesHtml: $notesHtml,
              status: "draft"
            }')

          update_payload=$(jq -n \
            --arg name "Release ${TAG}" \
            --arg rollbackFromVersion "${rollback_from_version}" \
            --argjson rollbackCompatible "${rollback_compatible}" \
            --argjson notes "${notes_json}" \
            --argjson notesHtml "${notes_html_json}" \
            '{
              name: $name,
              rollbackFromVersion: $rollbackFromVersion,
              rollbackCompatible: $rollbackCompatible,
              notes: $notes,
              notesHtml: $notesHtml
            }')

          http_code=$(curl -sS -o /tmp/nexus-release-create.json -w "%{http_code}" \
            -X POST "${NEXUS_BASE_URL}/api/releases" \
            "${nexus_headers[@]}" \
            -H "Content-Type: application/json" \
            -d "${create_payload}")

          if [ "${http_code}" = "400" ] && response_has_status_message /tmp/nexus-release-create.json 'Release tag already exists.'; then
            patch_code=$(curl -sS -o /tmp/nexus-release-update.json -w "%{http_code}" \
              -X PATCH "${NEXUS_BASE_URL}/api/releases/${TAG}" \
              "${nexus_headers[@]}" \
              -H "Content-Type: application/json" \
              -d "${update_payload}")
            assert_nexus_response_ok /tmp/nexus-release-update.json "${patch_code}" '.release.id? and .release.tag?'
          elif [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            assert_nexus_response_ok /tmp/nexus-release-create.json "${http_code}"
            exit 1
          else
            assert_nexus_response_ok /tmp/nexus-release-create.json "${http_code}" '.release.id? and .release.tag?'
          fi

      - name: Link GitHub assets to Nexus release
        run: |
          set -euo pipefail
          source /tmp/nexus-sync-helpers.sh
          nexus_headers=()
          create_nexus_headers nexus_headers


          while IFS= read -r encoded; do
            manifest_item=$(printf '%s' "${encoded}" | base64 --decode)
            name=$(printf '%s' "${manifest_item}" | jq -r '.name')
            platform=$(printf '%s' "${manifest_item}" | jq -r '.platform')
            arch=$(printf '%s' "${manifest_item}" | jq -r '.arch')
            sha256=$(printf '%s' "${manifest_item}" | jq -r '.sha256')
            signature_name=$(printf '%s' "${manifest_item}" | jq -r '.signature')

            asset_item=$(jq -ce --arg name "${name}" 'first(.assets[] | select(.name==$name))' /tmp/github-release.json)
            signature_item=$(jq -ce --arg name "${signature_name}" 'first(.assets[] | select(.name==$name))' /tmp/github-release.json)
            url=$(printf '%s' "${asset_item}" | jq -r '.browser_download_url')
            size=$(printf '%s' "${asset_item}" | jq -r '.size')
            content_type=$(printf '%s' "${asset_item}" | jq -r '.content_type // "application/octet-stream"')
            signature_url=$(printf '%s' "${signature_item}" | jq -r '.browser_download_url')

            payload=$(jq -n \
              --arg platform "${platform}" \
              --arg arch "${arch}" \
              --arg filename "${name}" \
              --arg downloadUrl "${url}" \
              --arg signatureUrl "${signature_url}" \
              --argjson size "${size}" \
              --arg sha256 "${sha256}" \
              --arg contentType "${content_type}" \
              '{
                platform: $platform,
                arch: $arch,
                filename: $filename,
                downloadUrl: $downloadUrl,
                signatureUrl: $signatureUrl,
                size: $size,
                sha256: $sha256,
                contentType: $contentType
              }')

            http_code=$(curl -sS -o /tmp/nexus-release-link.json -w "%{http_code}" \
              -X POST "${NEXUS_BASE_URL}/api/releases/${TAG}/link-github" \
              "${nexus_headers[@]}" \
              -H "Content-Type: application/json" \
              -d "${payload}")
            assert_nexus_response_ok /tmp/nexus-release-link.json "${http_code}" '.asset.id? and .asset.platform? and .asset.arch? and .asset.signatureUrl?'
          done < <(jq -r '.artifacts[] | select(.component=="core") | @base64' /tmp/tuff-release-manifest.json)

      - name: Publish Nexus release
        run: |
          source /tmp/nexus-sync-helpers.sh
          nexus_headers=()
          create_nexus_headers nexus_headers

          http_code=$(curl -sS -o /tmp/nexus-release-publish.json -w "%{http_code}" \
            -X POST "${NEXUS_BASE_URL}/api/releases/${TAG}/publish" \
            "${nexus_headers[@]}")
          assert_nexus_response_ok /tmp/nexus-release-publish.json "${http_code}" '.release.id? and .release.tag? and .message?'
