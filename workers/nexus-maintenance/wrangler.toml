name = "tuff-nexus-maintenance"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[triggers]
crons = ["23 */6 * * *"]

[env.production]
name = "tuff-nexus-maintenance-production"
workers_dev = false

[[env.production.d1_databases]]
binding = "DB"
database_name = "tuff-nexus-prod"
database_id = "ebdeb7fc-74a4-4963-9bca-310a9aa0e4d6"

[env.preview]
name = "tuff-nexus-maintenance-preview"
workers_dev = false

[[env.preview.d1_databases]]
binding = "DB"
database_name = "tuff-nexus-dev"
database_id = "963cd4ae-2a63-408d-b3bc-fa5945f1e878"
