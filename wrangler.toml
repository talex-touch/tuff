name = "tuff"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat", "no_nodejs_compat_v2"]
pages_build_output_dir = "apps/nexus/dist"

[[d1_databases]]
binding = "DB"
database_name = "tuff-nexus-prod"
database_id = "ebdeb7fc-74a4-4963-9bca-310a9aa0e4d6"

[[r2_buckets]]
binding = "R2"
bucket_name = "tuff-nexus-imgable-prod"
preview_bucket_name = "tuff-nexus-imgable-dev"

[[kv_namespaces]]
binding = "TUFF_INTELLIGENCE_RUNTIME"
id = "REPLACE_WITH_TUFF_INTELLIGENCE_RUNTIME_KV_ID"
preview_id = "REPLACE_WITH_TUFF_INTELLIGENCE_RUNTIME_KV_PREVIEW_ID"

[env.preview]
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat", "no_nodejs_compat_v2"]
[[env.preview.d1_databases]]
binding = "DB"
database_name = "tuff-nexus-dev"
database_id = "963cd4ae-2a63-408d-b3bc-fa5945f1e878"

[env.preview.vars]
NODE_OPTIONS = "--max-old-space-size=6144"
AUTH_SECRET = "change-me"
AUTH_ORIGIN = "http://localhost:3200"
GITHUB_CLIENT_ID = ""
GITHUB_CLIENT_SECRET = ""
LINUXDO_CLIENT_ID = ""
LINUXDO_CLIENT_SECRET = ""
LINUXDO_ISSUER = "https://connect.linux.do"
RESEND_API_KEY = ""
AUTH_EMAIL_FROM = "hello@tuff.app"
EXCHANGE_RATE_API_KEY = ""
EXCHANGE_RATE_BASE_URL = "https://v6.exchangerate-api.com/v6"
EXCHANGE_RATE_TTL_MS = "28800000"
EXCHANGE_RATE_TIMEOUT_MS = "10000"
EXCHANGE_RATE_HISTORY_RETENTION_DAYS = "0"
EXCHANGE_RATE_STORE_RATE_ROWS = "true"

[[env.preview.r2_buckets]]
binding = "R2"
bucket_name = "tuff-nexus-imgable-dev"

[[env.preview.kv_namespaces]]
binding = "TUFF_INTELLIGENCE_RUNTIME"
id = "REPLACE_WITH_TUFF_INTELLIGENCE_RUNTIME_KV_PREVIEW_ID"

[vars]
NODE_OPTIONS = "--max-old-space-size=6144"
AUTH_SECRET = "change-me"
AUTH_ORIGIN = "https://tuff.tagzxia.com"
GITHUB_CLIENT_ID = ""
GITHUB_CLIENT_SECRET = ""
LINUXDO_CLIENT_ID = ""
LINUXDO_CLIENT_SECRET = ""
LINUXDO_ISSUER = "https://connect.linux.do"
RESEND_API_KEY = ""
AUTH_EMAIL_FROM = "hello@tuff.app"
EXCHANGE_RATE_API_KEY = ""
EXCHANGE_RATE_BASE_URL = "https://v6.exchangerate-api.com/v6"
EXCHANGE_RATE_TTL_MS = "28800000"
EXCHANGE_RATE_TIMEOUT_MS = "10000"
EXCHANGE_RATE_HISTORY_RETENTION_DAYS = "0"
EXCHANGE_RATE_STORE_RATE_ROWS = "true"
