name = "tuff"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat", "no_nodejs_compat_v2"]
pages_build_output_dir = "apps/nexus/dist"

[[d1_databases]]
binding = "DB"
database_name = "tuff-nexus-prod"
database_id = "ebdeb7fc-74a4-4963-9bca-310a9aa0e4d6"

[[r2_buckets]]
binding = "R2"
bucket_name = "tuff-nexus-imgable-prod"
preview_bucket_name = "tuff-nexus-imgable-dev"

[env.preview]
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat", "no_nodejs_compat_v2"]
[[env.preview.d1_databases]]
binding = "DB"
database_name = "tuff-nexus-dev"
database_id = "963cd4ae-2a63-408d-b3bc-fa5945f1e878"

[env.preview.vars]
NODE_OPTIONS = "--max-old-space-size=6144"
AUTH_SECRET = "change-me"
AUTH_ORIGIN = "http://localhost:3200"
GITHUB_CLIENT_ID = ""
GITHUB_CLIENT_SECRET = ""
LINUXDO_CLIENT_ID = ""
LINUXDO_CLIENT_SECRET = ""
LINUXDO_ISSUER = "https://connect.linux.do"
RESEND_API_KEY = ""
AUTH_EMAIL_FROM = "hello@tuff.app"
ADMIN_BREAKGLASS_ENABLED = "true"
ADMIN_CONTROL_PLANE_PROTECTED_ENABLED = "true"
ADMIN_DUAL_CONTROL_ENABLED = "true"
ADMIN_PRESERVE_IN_EXTREME_ENABLED = "true"
ADMIN_EMERGENCY_JWT_SECRET = "change-me-admin-emergency-jwt-secret"
ADMIN_CONTROL_PLANE_PEPPER = "change-me-admin-control-plane-pepper"
ADMIN_EMERGENCY_ISSUER_VERSION = "v1"
ADMIN_CF_ACCESS_CLIENT_ID = ""
ADMIN_CF_ACCESS_CLIENT_SECRET = ""
ADMIN_OOB_MTLS_ENABLED = "false"
ADMIN_OOB_MTLS_FINGERPRINTS = ""
ADMIN_DEFAULT_DEFENSE_MODE = "NORMAL"

[[env.preview.r2_buckets]]
binding = "R2"
bucket_name = "tuff-nexus-imgable-dev"

[vars]
